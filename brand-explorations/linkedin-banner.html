<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tek Monkeys // LinkedIn banner</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:    #f0eee9;
    --paper-2:  #e8e5dd;
    --ink:      #15171c;
    --ink-soft: rgba(20, 23, 28, 0.55);
    --ink-dim:  rgba(20, 23, 28, 0.35);
    --banana:   #f4c01b;
    --banana-d: #c89a0e;
    --dark:     #15171c;
    --dark-ink: #fafaf7;
    --font-sans: "Space Grotesk", -apple-system, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #cfc9bd;
    color: var(--ink);
    font-family: var(--font-sans);
    min-height: 100vh;
    padding: 32px 16px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ===== controls ===== */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .controls button {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink-dim);
    padding: 8px 14px;
    border-radius: 2px;
    cursor: pointer;
    font: inherit;
    letter-spacing: inherit;
    text-transform: uppercase;
  }
  .controls button:hover { border-color: var(--ink); }
  .controls button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ===== banner — exact 1584 × 396 ===== */
  .stage-wrap {
    transform-origin: top center;
    transform: scale(var(--zoom, 0.5));
    transition: transform 0.2s;
  }
  .banner {
    width: 1584px;
    height: 396px;
    background: var(--paper);
    color: var(--ink);
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(60, 50, 30, 0.22), 0 0 0 1px rgba(20,23,28,0.06);
  }

  /* mark recolour via CSS custom properties — these DO inherit through <use>. */
  .banner { --mark-stroke: var(--ink); --mark-banana: var(--banana); --mark-stem-cap: var(--banana-d); }
  .banner .lockup .mark { color: var(--mark-stroke); }

  /* ===== ON DARK variant ===== */
  .banner.dark { background: var(--dark); color: var(--dark-ink); --mark-stroke: var(--dark-ink); --mark-banana: var(--banana); --mark-stem-cap: var(--banana-d); }
  .banner.dark .wordmark { color: var(--dark-ink); }
  .banner.dark .tagline { color: var(--banana); }
  .banner.dark .right-block .who { color: var(--dark-ink); }
  .banner.dark .right-block .role,
  .banner.dark .right-block .stack { color: rgba(250,250,247,0.55); }
  .banner.dark .corner { color: rgba(250,250,247,0.30); }
  .banner.dark .right-block .rule { background: rgba(250,250,247,0.25); }


  /* ===== layout ===== */
  .row {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    padding: 0 120px;
  }

  /* big horizontal lockup, mark + wordmark + tagline */
  .lockup {
    display: flex;
    align-items: center;
    gap: 56px;
  }
  .lockup .mark { width: 220px; height: 264px; flex-shrink: 0; }
  .lockup .mark svg { display: block; width: 100%; height: 100%; }

  .word-block {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .wordmark {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 116px;
    line-height: 0.85;
    letter-spacing: -0.029em;
    color: var(--ink);
  }
  .tagline {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--banana-d);
  }

  /* right-edge mono micro block — recruiter-readable Nick context */
  .right-block {
    position: absolute;
    right: 120px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    font-family: var(--font-mono);
    color: var(--ink-soft);
    text-align: right;
  }
  .right-block .who {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.005em;
    color: var(--ink);
    line-height: 1.2;
  }
  .right-block .role {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .right-block .rule {
    width: 56px;
    height: 1px;
    background: rgba(20,23,28,0.25);
    margin: 6px 0;
  }
  .right-block .stack {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    line-height: 1.7;
  }
  .right-block .stack .accent { color: var(--banana-d); }
  .banner.dark .right-block .stack .accent { color: var(--banana); }
  .banner.yellow .right-block .stack .accent { color: var(--ink); }

  /* corners */
  .corner {
    position: absolute;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .corner.tl { top: 32px; left: 40px; }
  .corner.br { bottom: 32px; right: 40px; }

  /* ===== safe zone / profile bite overlay ===== */
  .safe, .bite { position: absolute; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  body[data-debug="1"] .safe, body[data-debug="1"] .bite { opacity: 1; }
  .safe {
    left: 50%; top: 50%;
    width: 1128px; height: 191px;
    transform: translate(-50%, -50%);
    border: 1px dashed var(--banana-d);
  }
  .bite {
    left: 152px; bottom: -88px;
    width: 224px; height: 224px;
    border-radius: 50%;
    border: 1px dashed var(--banana-d);
  }
  .banner.dark .safe, .banner.dark .bite { border-color: var(--banana); }
</style>
</head>
<body>

<div class="controls">
  <button onclick="setZoom(1)">100%</button>
  <button onclick="setZoom(0.65)">65%</button>
  <button class="active" id="z50" onclick="setZoom(0.5)">50%</button>
  <button onclick="setVariant('paper')" id="vp" class="active">paper</button>
  <button onclick="setVariant('dark')" id="vd">on dark</button>
  <button onclick="toggleDebug()">safe zone</button>
  <span style="margin-left:8px;">1584 × 396 · tek monkeys identity v2</span>
</div>

<!-- ===== primary mark — extracted directly from tek-monkeys-identity.html ===== -->
<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">
  <defs>
    <symbol id="tm-mark" viewBox="0 0 100 120">
      <!-- bulb + threads use currentColor (inherits from .mark) -->
      <path
        d="M 50 6 C 26 6, 14 24, 14 44 C 14 60, 24 70, 30 80 L 30 90 L 70 90 L 70 80 C 76 70, 86 60, 86 44 C 86 24, 74 6, 50 6 Z"
        fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round"/>
      <rect x="32" y="92"  width="36" height="4.5" rx="1" fill="currentColor"/>
      <rect x="34" y="100" width="32" height="4"   rx="1" fill="currentColor"/>
      <rect x="38" y="108" width="24" height="4"   rx="1" fill="currentColor"/>
      <!-- banana — recoloured via CSS variables (these DO inherit through <use>) -->
      <g transform="translate(22 18) scale(0.56)">
        <path
          d="M 22 24 C 12 32, 12 56, 28 74 C 44 90, 72 90, 84 84 C 90 82, 86 76, 78 76 C 60 76, 42 60, 36 40 C 30 26, 26 20, 22 24 Z"
          fill="var(--mark-banana, #f4c01b)"/>
        <g transform="rotate(-22 28 22)">
          <path d="M 23 10 L 31 10 L 33 24 L 21 24 Z" fill="var(--mark-banana, #f4c01b)"/>
          <ellipse cx="27" cy="10" rx="4" ry="1.4" fill="var(--mark-stem-cap, #c89a0e)"/>
        </g>
      </g>
    </symbol>
  </defs>
</svg>

<div class="stage-wrap" id="stageWrap">
  <div class="banner" id="banner">

    <div class="safe"></div>
    <div class="bite"></div>

    <span class="corner tl">tek monkeys · v2</span>
    <span class="corner br">est. 2024 · brisbane · tekmonkeys.io</span>

    <div class="row">
      <div class="lockup">
        <div class="mark"><svg><use href="#tm-mark"/></svg></div>
        <div class="word-block">
          <div class="wordmark">tek monkeys</div>
          <div class="tagline" id="tagline">ai&nbsp;&nbsp;·&nbsp;&nbsp;devops&nbsp;&nbsp;·&nbsp;&nbsp;rapid business solutions</div>
        </div>
      </div>
    </div>

    <div class="right-block">
      <div class="who">Nicholas&nbsp;W.&nbsp;Fraser</div>
      <div class="role">founder · ai engineer</div>
      <div class="rule"></div>
      <div class="stack">
        <span class="accent">anthropic claude</span><br/>
        typescript &middot; cloudflare<br/>
        sveltekit &middot; bun
      </div>
    </div>

  </div>
</div>

<script>
  const banner = document.getElementById('banner');
  function setZoom(z) {
    document.getElementById('stageWrap').style.setProperty('--zoom', z);
    document.querySelectorAll('.controls button').forEach(b => {
      if (['100%','65%','50%'].includes(b.textContent)) b.classList.remove('active');
    });
    const map = { 1:'100%', 0.65:'65%', 0.5:'50%' };
    [...document.querySelectorAll('.controls button')]
      .find(b => b.textContent === map[z])?.classList.add('active');
  }
  function setVariant(v) {
    banner.classList.remove('dark');
    if (v === 'dark') banner.classList.add('dark');
    ['vp','vd'].forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById({paper:'vp', dark:'vd'}[v]).classList.add('active');
  }
  function toggleDebug() {
    document.body.dataset.debug = document.body.dataset.debug === '1' ? '0' : '1';
  }
  setZoom(0.5);
</script>

</body>
</html>
