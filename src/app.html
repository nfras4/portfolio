<!doctype html>
<html lang="en" data-theme="dark" data-direction="editorial">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="description" content="Nicholas Fraser, Finance Honours student at UQ, founder of Tek Monkeys, building production web apps on Cloudflare's edge from Brisbane." />

		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta name="theme-color" content="#0b0b0e" />

		<!--
			TODO (pre-launch): uncomment when static/fonts/Fraunces[opsz,wght].woff2 ships.
			Fraunces is the only font used by the hero <h1> on first paint, so it is the
			only candidate worth preloading. Inter and JetBrains Mono load lazily via
			font-display: swap and do not block LCP.
			<link rel="preload" as="font" type="font/woff2" href="/fonts/Fraunces[opsz,wght].woff2" crossorigin />
		-->


		<meta property="og:type" content="website" />
		<meta property="og:title" content="Nicholas Fraser" />
		<meta property="og:description" content="Finance Honours student, founder of Tek Monkeys, edge developer in Brisbane shipping production TypeScript on Cloudflare." />
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Nicholas Fraser" />
		<meta name="twitter:description" content="Finance Honours student, founder of Tek Monkeys, edge developer in Brisbane shipping production TypeScript on Cloudflare." />
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
