<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nick — Analytics + Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
const { useState: useStateApp } = React;

function App() {
  const tweaksDefault = /*EDITMODE-BEGIN*/{
    "accentHue": 75,
    "showLiveCard": true,
    "denseSpacing": false
  }/*EDITMODE-END*/;
  const [tweaks, setTweak] = useTweaks(tweaksDefault);

  // Apply tweaks live
  React.useEffect(() => {
    document.documentElement.style.setProperty(
      "--accent",
      `oklch(0.78 0.16 ${tweaks.accentHue})`
    );
    document.documentElement.style.setProperty(
      "--accent-soft",
      `oklch(0.78 0.16 ${tweaks.accentHue} / 0.12)`
    );
  }, [tweaks.accentHue]);

  return (
    <React.Fragment>
      <Nav />
      <Hero />
      <AboutSection />
      <ProjectsSection />
      <SkillsSection />
      <ExperienceSection />
      <ContactSection />
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection title="accent">
          <TweakSlider
            label="hue"
            value={tweaks.accentHue}
            onChange={(v) => setTweak("accentHue", v)}
            min={0} max={360} step={5}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            {[145, 75, 220, 25, 300].map((h) => (
              <button
                key={h}
                onClick={() => setTweak("accentHue", h)}
                style={{
                  width: 28, height: 28, borderRadius: "50%",
                  background: `oklch(0.78 0.16 ${h})`,
                  border: tweaks.accentHue === h ? "2px solid #fff" : "1px solid #333",
                  cursor: "pointer",
                }}
                aria-label={`accent ${h}`}
              />
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
